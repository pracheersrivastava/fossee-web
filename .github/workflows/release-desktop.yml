name: Release Desktop (Windows)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build ChemViz.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: desktop/requirements.txt

      - name: Install dependencies
        working-directory: desktop
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        working-directory: desktop
        run: pyinstaller ChemViz.spec --noconfirm

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChemViz-windows
          path: desktop/dist/ChemViz.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/ChemViz.exe
          generate_release_notes: true
          draft: false
          prerelease: false
